      nodeParam:
        code: |+
          # -*- coding: utf-8 -*-
          def main(input):
              input = "/health-data"
              import os
              import zipfile
              import tempfile
              import csv

              def pick_latest_zip(folder):
                  zips = [os.path.join(folder, f) for f in os.listdir(folder) if f.lower().endswith(".zip")]
                  if not zips:
                      return None
                  return max(zips, key=os.path.getmtime)

              def strip_export_suffix(name):
                  base = os.path.basename(name)
                  base = os.path.splitext(base)[0]
                  if "_SimpleHealthExportCSV" in base:
                      base = base.split("_SimpleHealthExportCSV")[0]
                  return base

              if not input or not os.path.isdir(input):
                  return {"key0": f"错误: 输入路径不存在: {input}"}

              latest_zip = pick_latest_zip(input)
              if not latest_zip:
                  return {"key0": "错误: 没有 zip 文件"}

              keep_keywords = [
                  "HeartRate",
                  "RestingHeartRate",
                  "HeartRateVariabilitySDNN",
                  "OxygenSaturation",
                  "RespiratoryRate",
                  "StepCount",
                  "ActiveEnergyBurned",
                  "BasalEnergyBurned",
                  "BodyMass",
                  "BodyFatPercentage",
                  "BodyMassIndex",
                  "SleepAnalysis",
                  "AppleExerciseTime",
                  "AppleStandTime",
                  "DistanceWalkingRunning",
                  "WalkingHeartRateAverage",
                  "VO2Max",
                  "Workout"
              ]

              merged_lines = []

              with tempfile.TemporaryDirectory() as tmpdir:
                  with zipfile.ZipFile(latest_zip, "r") as zf:
                      zf.extractall(tmpdir)

                  csv_files = []
                  for root, _, files in os.walk(tmpdir):
                      for f in files:
                          if f.lower().endswith(".csv"):
                              csv_files.append(os.path.join(root, f))

                  kept_any = False

                  for csv_path in sorted(csv_files):
                      file_type = strip_export_suffix(csv_path)
                      if not any(k in file_type for k in keep_keywords):
                          continue

                      try:
                          with open(csv_path, "r", encoding="utf-8-sig", newline="") as f:
                              lines = f.readlines()

                          if len(lines) < 2:
                              continue

                          # 跳过第一行 sep=,
                          reader = csv.DictReader(lines[1:])

                          file_lines = []
                          parsed = 0

                          for row in reader:
                              if not row:
                                  continue

                              value = str(row.get("value", "")).strip()
                              if value == "":
                                  continue

                              type_name = str(row.get("type", file_type)).strip()
                              start_date = str(row.get("startDate", "")).strip()
                              end_date = str(row.get("endDate", "")).strip()
                              unit = str(row.get("unit", "")).strip()

                              file_lines.append(
                                  f"type={type_name}; startDate={start_date}; endDate={end_date}; unit={unit}; value={value}"
                              )
                              parsed += 1

                          if parsed > 0:
                              kept_any = True
                              merged_lines.append(f"===== {file_type} =====")
                              merged_lines.extend(file_lines[-20:])
                              merged_lines.append("")

                      except Exception as e:
                          merged_lines.append(f"===== {file_type} =====")
                          merged_lines.append(f"解析失败: {e}")
                          merged_lines.append("")

              if not kept_any:
                  return {"key0": "没有解析到有效健康数据"}

              return {"key0": "\n".join(merged_lines[:400])}

